<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <!-- QuickHire™ global favicon and app-icon data -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon" sizes="16x16 32x32 48x48 96x96" />
  <link rel="icon" href="/favicon-16x16.png" type="image/png" sizes="16x16" />
  <link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32" />
  <link rel="icon" href="/favicon-48x48.png" type="image/png" sizes="48x48" />
  <link rel="icon" href="/favicon-96x96.png" type="image/png" sizes="96x96" />
  <link rel="icon" href="/favicon-192x192.png" type="image/png" sizes="192x192" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#1f7a4a" />
  <link rel="stylesheet" href="/assets/global-shell.css?v=20260608-203812" />
  <script src="/assets/global-shell.js?v=20260608-203812"></script>
<title>QuickHire™ Job Board — Login</title>

  <!-- Config + shared helpers -->
  <script src="/config/config.js"></script>
  <script src="/assets/app.js"></script>

  <style>
    :root{
      /* Match index.html palette */
      --bg1:#f7fbf7;
      --bg2:#f1fff6;
      --card:#ffffff;
      --text:#0b1b12;
      --muted:#3e5a4a;
      --line:rgba(10,30,20,.14);

      --green:#1f7a4a;
      --green2:#2b9a5e;

      --blue:#1b6fb8;
      --blue2:#2b86d6;

      --yellow:#ffd66b;
      --yellow2:#ffe7a6;

      --danger:#b42318;

      --shadow: 0 10px 30px rgba(16, 24, 40, .10);
      --radius:16px;
      --radius2:20px;

      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--font);
      color:var(--text);
      background:
        radial-gradient(1000px 520px at 10% 0%, rgba(43,154,94,.18), transparent 60%),
        radial-gradient(900px 520px at 100% 0%, rgba(43,134,214,.14), transparent 55%),
        radial-gradient(700px 420px at 55% -10%, rgba(255,214,107,.22), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    a{color:var(--blue); text-decoration:none}
    a:hover{text-decoration:underline}

    /* Top bar (match index) */
    .topbar{
      position:sticky; top:0; z-index:10;
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--line);
    }
    .topbar-inner{
      max-width:1200px;
      margin:0 auto;
      padding:12px 16px;
      display:flex;
      align-items:center;
      gap:12px;
    }
    .brand{
      display:flex; align-items:center; gap:10px;
      min-width: 280px;
    }
    .brand a{display:flex; align-items:center; gap:12px; color:inherit; text-decoration:none}
    .brand img{
      height:102px; /* 3x larger */
      width:auto;
      display:block;
    }
    .brand .sub{
      font-size:12px;
      color:var(--muted);
      margin-top:2px;
      line-height:1.1;
    }
    .controls{
      flex:1;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:flex-end;
      flex-wrap:wrap;
    }

    .btn{
      border:1px solid var(--line);
      background: rgba(255,255,255,.9);
      color:var(--text);
      padding:10px 12px;
      border-radius: 12px;
      cursor:pointer;
      font-weight:700;
      box-shadow: 0 3px 10px rgba(0,0,0,.05);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      white-space:nowrap;
    }
    .btn:hover{border-color: rgba(10,30,20,.28)}
    .btn.primary{
      border-color: rgba(31,122,74,.35);
      background: linear-gradient(135deg, rgba(43,154,94,.18), rgba(255,255,255,.95));
      color: #0b2a19;
    }
    .btn.blue{
      border-color: rgba(27,111,184,.35);
      background: linear-gradient(135deg, rgba(43,134,214,.16), rgba(255,255,255,.95));
      color: #0b2540;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:18px 16px 26px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
      align-items:start;
    }
    @media (max-width: 980px){
      .grid{grid-template-columns:1fr}
      .brand{min-width:0}
      .brand img{height:74px}
      .qh-footer-logo{height:74px}
      .controls{justify-content:flex-start}
      .btn{flex:1}
      .controls .btn{min-width: 150px}
    }

    .panel{
      background: rgba(255,255,255,.88);
      border:1px solid var(--line);
      border-radius: var(--radius2);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .panel-header{
      padding:14px 14px 10px;
      border-bottom:1px solid var(--line);
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.80));
    }
    .panel-header h2{margin:0; font-size:14px}
    .panel-header .meta{color:var(--muted); font-size:12px}
    .content{padding:16px}

    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin:0 0 6px;
      font-weight:800;
      letter-spacing:.01em;
    }
    input, select{
      width:100%;
      padding:10px 12px;
      border-radius: 12px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.95);
      color:var(--text);
      outline:none;
      font-size:14px;
    }

    .muted{
      color:var(--muted);
      font-size:12px;
      line-height:1.35;
    }
    .hr{
      height:1px;
      background: rgba(10,30,20,.12);
      margin:12px 0;
    }
    .note{
      background: rgba(10,30,20,.04);
      border:1px solid rgba(10,30,20,.12);
      border-radius:14px;
      padding:12px;
    }

    /* Forgot link row */
    .forgot-row{
      display:flex;
      justify-content:flex-end;
      margin-top:10px;
      gap:10px;
      flex-wrap:wrap;
    }
    .forgot-row a{
      font-weight:800;
    }

    /* Footer logo + legal links (match index.html) */
    .qh-footer-logo-wrap{
      display:flex;
      justify-content:center;
      margin: 14px 0 8px;
    }
    .qh-footer-logo-wrap a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
    }
    .qh-footer-logo{
      height:102px; /* 3x larger */
      width:auto;
      display:block;
    }

    .qh-powered{
      text-align:center;
      margin-top: 10px;
      font-weight:900;
      letter-spacing:.02em;
    }
    .qh-powered a{
      color: var(--blue);
      text-decoration:underline;
    }
  </style>
</head>

<body>
    <div id="qh-global-header"></div>
  <script>window.QHGlobalShell && window.QHGlobalShell.mountHeader();</script>

  <div class="wrap">
    <div class="grid">
      <!-- Login -->
      <div class="panel">
        <div class="panel-header">
          <div>
            <h2>Login</h2>
            <div class="meta">Candidates can browse without logging in, but must login to apply.</div>
          </div>
        </div>

        <div class="content">
          <label for="role">Account Type</label>
          <select id="role">
            <option value="job_seeker">Candidate</option>
            <option value="employer">Employer</option>
          </select>

          <div style="height:10px;"></div>

          <label for="login">Username/E-mail</label>
          <input id="login" placeholder="Enter your username OR your email" autocomplete="username"/>

          <div style="height:10px;"></div>

          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Password" autocomplete="current-password"/>

          <div class="hr"></div>
          <button class="btn primary" id="btnLogin" type="button">Login</button>

          <div class="forgot-row">
            <a id="forgotLink" href="/auth/reset.html">Forgot Password?</a>
          </div>
        </div>
      </div>

      <!-- Welcome / Message (no payments language) -->
      <div class="note">
        <div style="font-weight:1000; margin-bottom:6px;">Welcome to QuickHire™.</div>
        <div class="muted">
          Sign in with your Username or E-mail to manage your account and applications.
        </div>
      </div>
    </div>

    <!-- Footer (same as index.html) -->
    

        <div id="qh-global-footer"></div>
    <script>window.QHGlobalShell && window.QHGlobalShell.mountFooter();</script>

    <script>
      (function () {
        var y = new Date().getFullYear();
        var el = document.getElementById('qh-year');
        if (el) el.textContent = String(y);
      })();
    </script>

    <div id="toast" class="toast"><div class="t"></div><div class="m"></div></div>
  </div>

<script>
  (function () {
    // --- Role preselect logic ---
    // Priority: ?role=... > localStorage > default job_seeker
    const params = new URLSearchParams(window.location.search);
    const roleParam = (params.get("role") || "").trim().toLowerCase();
    const storedRole = (localStorage.getItem("qh_login_role") || "").trim().toLowerCase();
    const roleEl = document.getElementById("role");

    const isValidRole = (r) => (r === "job_seeker" || r === "employer");
    const initialRole = isValidRole(roleParam) ? roleParam : (isValidRole(storedRole) ? storedRole : "job_seeker");
    if (roleEl) roleEl.value = initialRole;

    // Persist when user changes
    if (roleEl) {
      roleEl.addEventListener("change", () => {
        const v = String(roleEl.value || "").trim();
        if (isValidRole(v)) localStorage.setItem("qh_login_role", v);
      });
    }

    // --- Signup links carry ?next and lock role correctly ---
    const next = params.get("next");
    const safeNext = (next && next.startsWith("/")) ? next : "";
    const nextParam = encodeURIComponent(safeNext || "/");

    const cand = document.getElementById("candidateSignupBtn");
    const emp = document.getElementById("employerSignupBtn");
    if (cand) cand.href = "/auth/signup-job-seeker.html?next=" + nextParam;
    if (emp) emp.href = "/auth/signup-employer.html?next=" + nextParam;

    // --- Forgot password link carries role + typed login (for convenience) ---
    const forgot = document.getElementById("forgotLink");
    const loginInput = document.getElementById("login");

    function updateForgotHref() {
      const role = roleEl ? String(roleEl.value || "job_seeker") : "job_seeker";
      const login = loginInput ? String(loginInput.value || "").trim() : "";
      const qs = new URLSearchParams();
      qs.set("role", role);
      if (login) qs.set("login", login);
      if (safeNext) qs.set("next", safeNext);
      if (forgot) forgot.href = "/auth/reset.html?" + qs.toString();
    }

    if (roleEl) roleEl.addEventListener("change", updateForgotHref);
    if (loginInput) loginInput.addEventListener("input", updateForgotHref);
    updateForgotHref();
  })();

  document.getElementById("btnLogin").addEventListener("click", async () => {
    const role = document.getElementById("role").value;
    const login = document.getElementById("login").value.trim().toLowerCase();
    const password = document.getElementById("password").value;

    if (!login || !password) return QH.toast("Missing info", "Enter Username/E-mail and Password.");

    const res = await QH.apiPost("login", { role, login, password });
    if (!res.ok) return QH.toast("Login failed", res.error || "Invalid credentials.");

    // Normalize session store shape
    const session = { role, session_token: res.session_token };
    if (role === "employer") {
      session.employer_id = res.employer_id;
      session.company_id = res.company_id;
    } else {
      session.job_seeker_id = res.job_seeker_id;
    }

    QH.saveSession(session);
    QH.toast("Logged in", "Success.");

    // Redirect (honor ?next=... if present)
    const next = new URLSearchParams(window.location.search).get("next");
    const safeNext = (next && next.startsWith("/")) ? next : "";

    if (role === "employer") window.location.href = safeNext || "/employer/dashboard.html";
    else window.location.href = safeNext || "/";
  });

  // Enter-to-submit
  document.getElementById("password").addEventListener("keydown", (e) => {
    if (e.key === "Enter") document.getElementById("btnLogin").click();
  });
</script>
</body>
</html>
