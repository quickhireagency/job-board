<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <!-- QuickHire™ global favicon and app-icon data -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon" sizes="16x16 32x32 48x48 96x96" />
  <link rel="icon" href="/favicon-16x16.png" type="image/png" sizes="16x16" />
  <link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32" />
  <link rel="icon" href="/favicon-48x48.png" type="image/png" sizes="48x48" />
  <link rel="icon" href="/favicon-96x96.png" type="image/png" sizes="96x96" />
  <link rel="icon" href="/favicon-192x192.png" type="image/png" sizes="192x192" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#1f7a4a" />
  <link rel="stylesheet" href="/assets/global-shell.css?v=20260608-203812" />
  <script src="/assets/global-shell.js?v=20260608-203812"></script>
<title>QuickHire™ — Employer Packet</title>

  <!-- Match index pages: include config + app (safe; does not change content) -->
  <script src="/config/config.js"></script>
  <script src="/assets/app.js"></script>

  <style>
    :root{
      /* Match index.html palette */
      --bg1:#f7fbf7;
      --bg2:#f1fff6;
      --card:#ffffff;
      --text:#0b1b12;
      --muted:#3e5a4a;
      --line:rgba(10,30,20,.14);

      --green:#1f7a4a;
      --green2:#2b9a5e;

      --blue:#1b6fb8;
      --blue2:#2b86d6;

      --yellow:#ffd66b;
      --yellow2:#ffe7a6;

      --danger:#b42318;

      --shadow: 0 10px 30px rgba(16, 24, 40, .10);
      --radius:16px;
      --radius2:20px;

      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--font);
      color:var(--text);
      background:
        radial-gradient(1000px 520px at 10% 0%, rgba(43,154,94,.18), transparent 60%),
        radial-gradient(900px 520px at 100% 0%, rgba(43,134,214,.14), transparent 55%),
        radial-gradient(700px 420px at 55% -10%, rgba(255,214,107,.22), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    a{color:var(--blue); text-decoration:none}
    a:hover{text-decoration:underline}

    /* Top bar (match index) */
    .topbar{
      position:sticky; top:0; z-index:10;
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--line);
    }
    .topbar-inner{
      max-width:1200px;
      margin:0 auto;
      padding:12px 16px;
      display:flex;
      align-items:center;
      gap:12px;
    }
    .brand{
      display:flex; align-items:center; gap:10px;
      min-width: 280px;
    }
    .brand a{display:flex; align-items:center; gap:12px; color:inherit; text-decoration:none}
    .brand img{
      height:102px; /* 3x larger */
      width:auto;
      display:block;
    }
    .brand .sub{
      font-size:12px;
      color:var(--muted);
      margin-top:2px;
      line-height:1.1;
    }
    .controls{
      flex:1;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:flex-end;
      flex-wrap:wrap;
    }

    .btn{
      border:1px solid var(--line);
      background: rgba(255,255,255,.9);
      color:var(--text);
      padding:10px 12px;
      border-radius: 12px;
      cursor:pointer;
      font-weight:700;
      box-shadow: 0 3px 10px rgba(0,0,0,.05);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      white-space:nowrap;
    }
    .btn:hover{border-color: rgba(10,30,20,.28)}
    .btn.blue{
      border-color: rgba(27,111,184,.35);
      background: linear-gradient(135deg, rgba(43,134,214,.16), rgba(255,255,255,.95));
      color: #0b2540;
    }
    .btn.primary{
      border-color: rgba(31,122,74,.35);
      background: linear-gradient(135deg, rgba(43,154,94,.18), rgba(255,255,255,.95));
      color: #0b2a19;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:18px 16px 26px;
    }

    .panel{
      background: rgba(255,255,255,.88);
      border:1px solid var(--line);
      border-radius: var(--radius2);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .panel-header{
      padding:14px 14px 10px;
      border-bottom:1px solid var(--line);
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.80));
    }
    .panel-header h1{margin:0; font-size:16px}
    .panel-header .meta{color:var(--muted); font-size:12px}
    .content{padding:16px}

    .note{
      background: rgba(10,30,20,.04);
      border:1px solid rgba(10,30,20,.12);
      border-radius:14px;
      padding:12px;
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
      margin-bottom:12px;
    }

    iframe{
      width:100%;
      height:75vh;
      border:0;
      border-radius:12px;
      overflow:hidden;
      background:#fff;
    }

    /* Footer logo + legal links (match index.html) */
    .qh-footer-logo-wrap{
      display:flex;
      justify-content:center;
      margin: 14px 0 8px;
    }
    .qh-footer-logo-wrap a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
    }
    .qh-footer-logo{
      height:102px; /* 3x larger */
      width:auto;
      display:block;
    }

    .qh-powered{
      text-align:center;
      margin-top: 10px;
      font-weight:900;
      letter-spacing:.02em;
    }
    .qh-powered a{
      color: var(--blue);
      text-decoration:underline;
    }
  </style>
</head>

<body>
    <div id="qh-global-header"></div>
  <script>window.QHGlobalShell && window.QHGlobalShell.mountHeader();</script>

  <div class="wrap">
    <div class="panel">
      <div class="panel-header">
        <div>
          <h1>QuickHire Employer Packet</h1>
          <div class="meta">Read the packet fully, then return to signup and check the acknowledgment box.</div>
        </div>
      </div>

      <div class="content">
        <div class="note">
          Tip: If the embedded preview is slow, open it in a new tab from the Drive viewer menu.
        </div>

        <iframe
          title="Employer Packet"
          src="https://drive.google.com/file/d/134TbOrSvJp233T7zCHI-jwKORxFcc0iw/preview">
        </iframe>
      </div>
    </div>

    <!-- Footer (same as index.html) -->
    

        <div id="qh-global-footer"></div>
    <script>window.QHGlobalShell && window.QHGlobalShell.mountFooter();</script>

    <script>
      (function () {
        var y = new Date().getFullYear();
        var el = document.getElementById('qh-year');
        if (el) el.textContent = String(y);
      })();
    </script>
  </div>
</body>
</html>
